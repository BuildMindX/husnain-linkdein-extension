<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkPilot AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Sign-in Gate (shown when not authenticated) ──────────────────────── -->
  <div id="sign-in-gate" class="sign-in-gate" style="display:none;">
    <div class="sig-logo">
      <img src="../assets/extension_icon.png" width="52" height="52" alt="LinkPilot AI" style="display:block;border-radius:14px;" />
    </div>
    <div class="sig-title">LinkPilot AI</div>
    <div class="sig-sub">by Satyron Private Limited</div>
    <div class="sig-lock">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="rgba(124,58,237,0.65)" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="sig-heading">Sign in to continue</div>
    <div class="sig-desc">A Google account is required to use LinkPilot AI.</div>
    <button id="sig-google-btn" class="sig-google-btn">
      <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div id="sig-status" class="sig-status" style="display:none;"></div>
    <div class="sig-powered">
      <img src="../assets/satyron_logo.png" width="20" height="20" alt="Satyron" style="border-radius:5px;" />
      <div class="sig-powered-text">
        <span class="sig-powered-label">Powered by</span>
        <span class="sig-powered-name">Satyron Private Limited</span>
      </div>
    </div>
  </div>

  <!-- ── Main Content (hidden until signed in) ─────────────────────────────── -->
  <div id="popup-main">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <div class="popup-header">
      <div class="popup-logo">
        <img src="../assets/extension_icon.png" width="42" height="42" alt="LinkPilot AI" style="display:block;border-radius:10px;" />
      </div>
      <div class="popup-header-text">
        <div class="popup-title">LinkPilot AI</div>
        <div class="popup-sub">by Satyron Private Limited</div>
      </div>
      <span id="popup-plan-badge" class="popup-plan-badge plan-free">Free</span>
    </div>

    <!-- ── Connections ────────────────────────────────────────────────────── -->
    <div class="popup-section">
      <div class="section-eyebrow">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
        Connections
      </div>
      <div class="connections-grid">
        <div class="conn-card" id="conn-openai">
          <span class="conn-dot" id="conn-openai-dot"></span>
          <div class="conn-info">
            <span class="conn-name">OpenAI</span>
            <span class="conn-status" id="conn-openai-status">Checking…</span>
          </div>
        </div>
        <div class="conn-card" id="conn-hubspot">
          <span class="conn-dot" id="conn-hubspot-dot"></span>
          <div class="conn-info">
            <span class="conn-name">HubSpot</span>
            <span class="conn-status" id="conn-hubspot-status">Not connected</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Active Configuration ───────────────────────────────────────────── -->
    <div class="popup-section">
      <div class="section-eyebrow">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Active Configuration
      </div>
      <div id="mode-card" class="mode-card"></div>
      <div id="post-mode-row" class="post-mode-row"></div>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────────────── -->
    <div class="popup-footer">
      <button id="open-settings" class="btn-settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Open Settings
      </button>
    </div>

  </div><!-- /#popup-main -->

  <script src="index.js"></script>
</body>
</html>
