<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Husnain LinkedIn Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
    <div class="popup-header-text">
      <div class="popup-title">Husnain LinkedIn Helper</div>
      <div class="popup-sub">AI-powered LinkedIn intelligence</div>
    </div>
  </div>

  <div class="popup-status-section">
    <div id="key-status" class="key-status"></div>
    <div id="intent-badge" class="intent-badge"></div>
  </div>

  <div class="popup-steps-section">
    <div class="section-title">How to use</div>
    <ol class="steps">
      <li>
        <span class="step-num">1</span>
        <span>Open any LinkedIn profile at <code>linkedin.com/in/…</code></span>
      </li>
      <li>
        <span class="step-num">2</span>
        <span>Click the blue <strong>Analyze</strong> button on the right edge</span>
      </li>
      <li>
        <span class="step-num">3</span>
        <span>Get AI-powered insights, scores, and personalized outreach</span>
      </li>
      <li>
        <span class="step-num">4</span>
        <span>Optionally push the lead to HubSpot as a deal</span>
      </li>
    </ol>
  </div>

  <div class="popup-footer">
    <button id="open-settings" class="btn-settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      Open Settings
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
