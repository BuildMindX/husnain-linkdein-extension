<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkPilot AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <div class="popup-header">
    <div class="popup-logo">
      <img src="extension_icon.png" width="42" height="42" alt="LinkPilot AI" style="display:block;border-radius:10px;" />
    </div>
    <div class="popup-header-text">
      <div class="popup-title">LinkPilot AI</div>
      <div class="popup-sub">by Satyron Private Limited</div>
    </div>
    <span id="popup-plan-badge" class="popup-plan-badge plan-free">Free</span>
  </div>

  <!-- ── Connections ──────────────────────────────────────────────────────── -->
  <div class="popup-section">
    <div class="section-eyebrow">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      Connections
    </div>
    <div class="connections-grid">
      <div class="conn-card" id="conn-openai">
        <span class="conn-dot" id="conn-openai-dot"></span>
        <div class="conn-info">
          <span class="conn-name">OpenAI</span>
          <span class="conn-status" id="conn-openai-status">Checking…</span>
        </div>
      </div>
      <div class="conn-card" id="conn-hubspot">
        <span class="conn-dot" id="conn-hubspot-dot"></span>
        <div class="conn-info">
          <span class="conn-name">HubSpot</span>
          <span class="conn-status" id="conn-hubspot-status">Not connected</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Active Configuration ─────────────────────────────────────────────── -->
  <div class="popup-section">
    <div class="section-eyebrow">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Active Configuration
    </div>
    <div id="mode-card" class="mode-card"></div>
    <div id="post-mode-row" class="post-mode-row"></div>
  </div>

  <!-- ── Footer ───────────────────────────────────────────────────────────── -->
  <div class="popup-footer">
    <button id="open-settings" class="btn-settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Open Settings
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
