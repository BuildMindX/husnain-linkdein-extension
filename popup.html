<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkPilot AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="popup-header">
    <div class="popup-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
    </div>
    <div class="popup-header-text">
      <div class="popup-title">LinkPilot AI</div>
      <div class="popup-sub">by Satyron Private Limited</div>
    </div>
    <span id="popup-plan-badge" class="popup-plan-badge plan-free">Free</span>
  </div>

  <!-- Connections -->
  <div class="popup-section">
    <div class="section-eyebrow">Connections</div>
    <div class="connections-row">
      <div class="conn-item" id="conn-openai">
        <span class="conn-dot" id="conn-openai-dot"></span>
        <span class="conn-name">OpenAI</span>
        <span class="conn-status" id="conn-openai-status">Checking...</span>
      </div>
      <div class="conn-sep"></div>
      <div class="conn-item" id="conn-hubspot">
        <span class="conn-dot" id="conn-hubspot-dot"></span>
        <span class="conn-name">HubSpot</span>
        <span class="conn-status" id="conn-hubspot-status">Not connected</span>
      </div>
    </div>
  </div>

  <!-- Active Mode -->
  <div class="popup-section">
    <div class="section-eyebrow">Active Configuration</div>
    <div id="mode-card" class="mode-card"></div>
    <div id="post-mode-row" class="post-mode-row"></div>
  </div>

  <!-- Quick Start -->
  <div class="popup-section popup-quickstart">
    <div class="section-eyebrow">Quick Start</div>
    <ol class="qs-list">
      <li>Open any LinkedIn profile at <code>linkedin.com/in/…</code></li>
      <li>Click the <strong>Analyze</strong> button on the right edge</li>
      <li>Get AI scores, insights, and outreach messages</li>
    </ol>
  </div>

  <!-- Footer -->
  <div class="popup-footer">
    <button id="open-settings" class="btn-settings">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Open Settings
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
